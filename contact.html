<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Andas Precision</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <!-- ... same header ... -->
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Get a quote for your CNC machining project</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="section">
        <div class="container">
            <div class="contact-grid">
                <!-- Contact Info -->
                <div class="contact-info">
                    <h3>Get in Touch</h3>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fab fa-whatsapp"></i>
                        </div>
                        <div class="contact-text">
                            <strong>WhatsApp</strong>
                            <span>+86 157 1082 937</span>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fab fa-line"></i>
                        </div>
                        <div class="contact-text">
                            <strong>Line</strong>
                            <span>line247327301</span>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-text">
                            <strong>Email</strong>
                            <span>sales@andas-industrial.com</span>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="contact-text">
                            <strong>Working Hours</strong>
                            <span>Mon-Fri: 9:00 AM - 6:00 PM (GMT+8)</span>
                        </div>
                    </div>
                </div>
                
                <!-- Contact Form -->
                <div class="contact-form">
                    <form id="inquiryForm" action="https://formspree.io/f/xvgrwwql" method="POST">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="company">Company Name</label>
                            <input type="text" id="company" name="company">
                        </div>
                        
                        <div class="form-group">
                            <label for="material">Material Requirement</label>
                            <select id="material" name="material">
                                <option value="">Select Material</option>
                                <option value="aluminum">Aluminum Alloy</option>
                                <option value="steel">Carbon Steel</option>
                                <option value="stainless">Stainless Steel</option>
                                <option value="brass">Brass</option>
                                <option value="titanium">Titanium</option>
                                <option value="plastic">Engineering Plastic</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="quantity">Estimated Quantity</label>
                            <input type="number" id="quantity" name="quantity" placeholder="PCS">
                        </div>
                        
                        <div class="form-group">
                            <label for="message">Project Details *</label>
                            <textarea id="message" name="message" placeholder="Describe your project, including tolerance requirements, surface finish, and any special instructions..." required></textarea>
                        </div>
                        
                        <button type="submit" class="submit-btn">Submit Inquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <!-- ... same footer ... -->
    </footer>

    <!-- Floating Buttons -->
    <div class="floating-buttons">
        <!-- ... same floating buttons ... -->
    </div>

    <script src="js/main.js"></script>
</body>
</html>
